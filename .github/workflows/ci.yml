# HL7 v2 Rust Workspace - CI Pipeline
# Implements the4-stage pipeline design from docs/TESTING_ARCHITECTURE.md
#
# Stage 1 (Fast - 2 min): Format, Clippy, Unit tests, Doc tests
# Stage 2 (Standard - 5 min): Integration tests, BDD tests, Limited property tests
# Stage 3 (Extended - 10 min): Full property tests, Coverage, Benchmarks (main branch only)

name: CI

on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -Dwarnings
  RUSTDOCFLAGS: -Dwarnings

jobs:
  # ============================================================================
  # Stage 1: Fast Feedback (~2 minutes)
  # Runs on every PR and push
  # ============================================================================
  fast:
    name: Fast Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        rust: [stable]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: fast-${{ matrix.rust }}

      - name: Check formatting (xtask)
        run: cargo run -p xtask -- gate --check --only fmt

      - name: Run clippy lints (xtask)
        run: cargo run -p xtask -- gate --check --only clippy

      - name: Run unit tests
        run: cargo test --lib --workspace --all-features
        timeout-minutes: 3

      - name: Run doc tests
        run: cargo test --doc --workspace --all-features
        timeout-minutes: 2

  # ============================================================================
  # Stage 2: Standard Tests (~5 minutes)
  # Runs on every PR and push after fast stage passes
  # ============================================================================
  standard:
    name: Standard Tests
    runs-on: ubuntu-latest
    needs: fast
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        rust: [stable]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: standard-${{ matrix.rust }}

      - name: Run integration tests
        run: cargo test --test '*' --workspace --all-features
        timeout-minutes: 10

      - name: Run BDD tests
        run: |
          # Run BDD tests for crates that have them
          cargo test --test bdd_tests -p hl7v2-core || echo "No BDD tests in hl7v2-core"
          cargo test --test bdd_tests -p hl7v2-cli || echo "No BDD tests in hl7v2-cli"
          cargo test --test bdd_tests -p hl7v2-validation || echo "No BDD tests in hl7v2-validation"
        timeout-minutes: 5

      - name: Run limited property tests
        env:
          PROPTEST_CASES: 100
        run: cargo test --workspace --features proptest property || echo "Property tests completed"
        timeout-minutes: 5

  # ============================================================================
  # Stage 2 (Parallel): Multi-Rust Version Tests
  # ============================================================================
  matrix-test:
    name: Matrix Tests
    runs-on: ${{ matrix.os }}
    needs: fast
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta]
        exclude:
          # Reduce CI load: skip beta on non-linux
          - os: windows-latest
            rust: beta
          - os: macos-latest
            rust: beta
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: matrix-${{ matrix.os }}-${{ matrix.rust }}

      - name: Run tests
        run: cargo test --workspace --all-features
        timeout-minutes: 10

  # ============================================================================
  # Stage 3: Extended Tests (~10 minutes)
  # Runs only on main branch after standard stage passes
  # ============================================================================
  extended:
    name: Extended Tests
    runs-on: ubuntu-latest
    needs: [fast, standard]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: extended-stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run full property tests
        env:
          PROPTEST_CASES: 1000
        run: cargo test --workspace --features proptest property || echo "Property tests completed"
        timeout-minutes: 10

      - name: Generate coverage report
        run: |
          cargo tarpaulin --workspace --all-features --out Xml --out Html \
            --output-dir coverage/ --timeout 600 --skip-clean
        timeout-minutes: 15

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================================
  # Stage 3 (Parallel): Benchmarks
  # Non-failing, tracks performance regressions
  # ============================================================================
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: [fast, standard]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench-stable

      - name: Run benchmarks
        run: |
          cargo bench --workspace -- --output-format bencher | tee benchmark-results.txt || true
        timeout-minutes: 10
        continue-on-error: true

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: benchmark-results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          comment-on-alert: true
          fail-on-alert: false
        continue-on-error: true

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 30

  # ============================================================================
  # Summary Job
  # Reports overall CI status
  # ============================================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [fast, standard, matrix-test]
    if: always() && !failure()
    steps:
      - name: Check CI status
        run: |
          echo "✅ CI Pipeline completed successfully"
          echo "- Fast checks: passed"
          echo "- Standard tests: passed"
          echo "- Matrix tests: passed"
