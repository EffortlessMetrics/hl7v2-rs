# HL7 v2 Rust Workspace - CI Pipeline
# Implements the 4-stage pipeline design from docs/TESTING_ARCHITECTURE.md
#
# Stage 1 (Fast - 2 min): Format, Clippy, Unit tests, Doc tests
# Stage 2 (Standard - 5 min): Integration tests, BDD tests, Limited property tests
# Stage 3 (Extended - 10 min): Full property tests, Benchmarks (main branch only)

name: CI

on:
  push:
    branches: [main, 'release/**', 'claude/**']
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -Dwarnings
  RUSTDOCFLAGS: -Dwarnings

jobs:
  # ============================================================================
  # Stage 1: Fast Feedback (~2 minutes)
  # Runs on every PR and push
  # ============================================================================
  fast:
    name: Fast Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        rust: [stable]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: fast-${{ matrix.rust }}

      - name: Check formatting (xtask)
        run: cargo run -p xtask -- gate --check --only fmt

      - name: Run clippy lints (xtask)
        run: cargo run -p xtask -- gate --check --only clippy

      - name: Run unit tests
        run: cargo test --lib --workspace --all-features
        timeout-minutes: 3

      - name: Run doc tests
        run: cargo test --doc --workspace --all-features
        timeout-minutes: 2

  # ============================================================================
  # Stage 2: Standard Tests (~5 minutes)
  # Runs on every PR and push after fast stage passes
  # ============================================================================
  standard:
    name: Standard Tests
    runs-on: ubuntu-latest
    needs: fast
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        rust: [stable]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: standard-${{ matrix.rust }}

      - name: Run integration tests
        run: cargo test --test '*' --workspace --all-features
        timeout-minutes: 10

      - name: Run BDD tests
        run: |
          # Run BDD tests for crates that have them
          cargo test --test bdd_tests -p hl7v2-core || echo "No BDD tests in hl7v2-core"
          cargo test --test bdd_tests -p hl7v2-cli || echo "No BDD tests in hl7v2-cli"
          cargo test --test bdd_tests -p hl7v2-validation || echo "No BDD tests in hl7v2-validation"
        timeout-minutes: 5

      - name: Run limited property tests
        env:
          PROPTEST_CASES: 100
        run: |
          cargo test -p hl7v2-ack --test property_tests
          cargo test -p hl7v2-batch --test property_tests
          cargo test -p hl7v2-core --test property_tests
          cargo test -p hl7v2-corpus --test property_tests
          cargo test -p hl7v2-datatype --test property_tests
          cargo test -p hl7v2-datetime --test property_tests
          cargo test -p hl7v2-escape --test property_tests
          cargo test -p hl7v2-faker --test property_tests
          cargo test -p hl7v2-json --test property_tests
          cargo test -p hl7v2-mllp --test property_tests
          cargo test -p hl7v2-normalize --test property_tests
          cargo test -p hl7v2-path --test property_tests
          cargo test -p hl7v2-prof --test property_tests
          cargo test -p hl7v2-query --test property_tests
          cargo test -p hl7v2-template --test property_tests
          cargo test -p hl7v2-writer --test property_tests
        timeout-minutes: 5

  # ============================================================================
  # Stage 2 (Parallel): Multi-Rust Version Tests
  # ============================================================================
  matrix-test:
    name: Matrix Tests
    runs-on: ${{ matrix.os }}
    needs: fast
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta, '1.92']
        exclude:
          # beta and MSRV only on ubuntu to reduce CI load
          - os: windows-latest
            rust: beta
          - os: macos-latest
            rust: beta
          - os: windows-latest
            rust: '1.92'
          - os: macos-latest
            rust: '1.92'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: matrix-${{ matrix.os }}-${{ matrix.rust }}

      - name: Run tests
        run: cargo test --workspace --all-features
        timeout-minutes: 10

  # ============================================================================
  # Stage 3: Extended Tests (~10 minutes)
  # Runs only on main branch after standard stage passes
  # ============================================================================
  extended:
    name: Extended Tests
    runs-on: ubuntu-latest
    needs: [fast, standard]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: extended-stable

      - name: Run full property tests
        env:
          PROPTEST_CASES: 1000
        run: |
          cargo test -p hl7v2-ack --test property_tests
          cargo test -p hl7v2-batch --test property_tests
          cargo test -p hl7v2-core --test property_tests
          cargo test -p hl7v2-corpus --test property_tests
          cargo test -p hl7v2-datatype --test property_tests
          cargo test -p hl7v2-datetime --test property_tests
          cargo test -p hl7v2-escape --test property_tests
          cargo test -p hl7v2-faker --test property_tests
          cargo test -p hl7v2-json --test property_tests
          cargo test -p hl7v2-mllp --test property_tests
          cargo test -p hl7v2-normalize --test property_tests
          cargo test -p hl7v2-path --test property_tests
          cargo test -p hl7v2-prof --test property_tests
          cargo test -p hl7v2-query --test property_tests
          cargo test -p hl7v2-template --test property_tests
          cargo test -p hl7v2-writer --test property_tests
        timeout-minutes: 10

  # ============================================================================
  # Stage 3 (Parallel): Benchmarks
  # Non-failing, tracks performance regressions
  # ============================================================================
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: [fast, standard]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench-stable

      - name: Run benchmarks
        run: |
          cargo bench --workspace 2>&1 | tee benchmark-results.txt || true
        timeout-minutes: 10
        continue-on-error: true

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 30

  # ============================================================================
  # Summary Job
  # Reports overall CI status
  # ============================================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [fast, standard, matrix-test]
    if: always() && !failure()
    steps:
      - name: Check CI status
        run: |
          echo "✅ CI Pipeline completed successfully"
          echo "- Fast checks: passed"
          echo "- Standard tests: passed"
          echo "- Matrix tests: passed"
