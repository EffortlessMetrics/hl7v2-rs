name: API Contracts

on:
  push:
    paths:
      - 'api/**'
      - '.github/workflows/contracts.yml'
  pull_request:
    paths:
      - 'api/**'

jobs:
  validate-openapi:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli

      - name: Validate OpenAPI
        run: spectral lint api/openapi/hl7v2-api-v1.yaml --ruleset .spectral.yml

      - name: Install Redocly
        run: npm install -g @redocly/cli

      - name: Generate API Docs
        run: redocly build-docs api/openapi/hl7v2-api-v1.yaml -o docs/api-reference.html

      - name: Upload API Docs
        uses: actions/upload-artifact@v3
        with:
          name: api-docs
          path: docs/api-reference.html

  validate-proto:
    name: Validate Protocol Buffers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint Protos
        run: buf lint api/proto

      - name: Check Breaking Changes
        if: github.event_name == 'pull_request'
        run: |
          buf breaking api/proto \
            --against "https://github.com/${{ github.repository }}.git#branch=${{ github.base_ref }},subdir=api/proto"

      - name: Generate Proto Docs
        run: |
          buf generate api/proto --template buf.gen.yaml

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: [validate-openapi, validate-proto]
    services:
      hl7v2-server:
        image: hl7v2-rs:test
        ports:
          - 8080:8080
          - 9090:9090
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Server
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8080/health; do sleep 2; done'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dredd
        run: npm install -g dredd

      - name: Run OpenAPI Contract Tests
        run: dredd api/openapi/hl7v2-api-v1.yaml http://localhost:8080

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install grpcurl
        run: go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest

      - name: Test gRPC Reflection
        run: |
          grpcurl -plaintext localhost:9090 list
          grpcurl -plaintext localhost:9090 describe hl7v2.v1.HL7Service

  schema-validation:
    name: Validate Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli

      - name: Validate Profile Schemas
        run: |
          ajv validate -s schemas/profile/profile-v1.schema.json \
            -d 'profiles/*.yaml' --spec=draft7

      - name: Validate Config Schema
        run: |
          ajv validate -s schemas/config/hl7v2-config-v1.schema.json \
            -d 'config/*.toml' --spec=draft7 || true

      - name: Validate Test Data
        run: |
          for schema in schemas/**/*.schema.json; do
            echo "Validating $schema"
            ajv compile -s "$schema"
          done
