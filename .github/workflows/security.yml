name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run Audit
        run: cargo audit --deny warnings

      - name: Generate Audit Report
        if: failure()
        run: cargo audit --json > audit-report.json

      - name: Upload Audit Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          log-level: warn
          command: check
          arguments: --all-features

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep --config auto --sarif > semgrep.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: semgrep.sarif

  clippy-security:
    name: Clippy Security Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run Clippy with Security Lints
        run: |
          cargo clippy --all-targets --all-features -- \
            -W clippy::cast_ptr_alignment \
            -W clippy::explicit_deref_methods \
            -W clippy::mem_forget \
            -W clippy::missing_safety_doc \
            -W clippy::undocumented_unsafe_blocks \
            -D warnings

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Requires the dependency graph to be enabled in repo settings
    # (Settings → Code security and analysis → Dependency graph)
    # TODO: remove continue-on-error once dependency graph is enabled in repo settings
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0

  license-regression:
    name: License Regression Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Check for stale license references
        run: |
          if rg -n "(\bMIT\b|MIT OR Apache|Apache-2\.0|SPDX-License-Identifier:\s*(MIT|Apache-2\.0))" \
            --glob '!deny.toml' \
            --glob '!Cargo.lock' \
            --glob '!THIRD_PARTY_NOTICES.md' \
            --glob '!target/**' \
            --glob '!.github/workflows/security.yml' \
            .; then
            echo "::error::Found MIT/Apache license references in project files"
            exit 1
          fi

  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
