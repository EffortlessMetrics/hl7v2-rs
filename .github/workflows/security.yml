    name: Dependency Audit
    if: false  # Ensure job never runs
    runs-on: ubuntu-latest
    steps:
      - run: echo "Workflow disabled"

  deny:
    name: Cargo Deny
    if: false  # Ensure job never runs
    runs-on: ubuntu-latest
    steps:
      - run: echo "Workflow disabled"

  sast:
    name: SAST (Semgrep)
    if: false  # Ensure job never runs
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - run: echo "Workflow disabled"

  clippy-security:
    name: Clippy Security Lints
    if: false  # Ensure job never runs
    runs-on: ubuntu-latest
    steps:
      - run: echo "Workflow disabled"

  dependency-review:
    name: Dependency Review
    if: false  # Ensure job never runs
    runs-on: ubuntu-latest
    steps:
      - run: echo "Workflow disabled"

  secrets-scan:
    name: Secrets Scanning
    if: false  # Ensure job never runs
    runs-on: ubuntu-latest
    steps:
      - run: echo "Workflow disabled"
