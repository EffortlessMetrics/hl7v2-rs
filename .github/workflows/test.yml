name: Test

on:
  push:
    branches: [main]
  # Removed pull_request trigger to save resources

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Tests
        # Combines check, clippy, test into one job to save minutes
        run: |
          cargo check --all
          cargo clippy --all -- -D warnings
          cargo test --all
