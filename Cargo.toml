[workspace]
members = [
    "crates/hl7v2-core",
    "crates/hl7v2-prof",
    "crates/hl7v2-gen",
    "crates/hl7v2-cli",
    "crates/hl7v2-server",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.89"
authors = ["Steven Zimmerman <git@efforlesssteven.com>"]
description = "Modern Rust HL7v2 Processor"
license = "AGPL v3"
repository = "https://github.com/EffortlessSteven/hl7v2-rs"
keywords = ["hl7", "healthcare", "parser", "validator"]
categories = ["parser-implementations", "encoding"]

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
clap = { version = "4.0", features = ["derive"] }
uuid = { version = "1.0", features = ["v4"] }
axum = "0.7"
tower = "0.5"
tower-http = "0.6"
tokio = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
metrics = "0.23"
metrics-exporter-prometheus = "0.15"
tower_governor = "0.4"

[workspace.lints.clippy]
pedantic = "warn"
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"