[workspace]
members = [
    "crates/hl7v2-core",
    "crates/hl7v2-prof",
    "crates/hl7v2-gen",
    "crates/hl7v2-cli",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.89"
authors = ["Steven Zimmerman <git@efforlesssteven.com>"]
description = "Modern Rust HL7v2 Processor"
license = "AGPL v3"
repository = "https://github.com/EffortlessSteven/hl7v2-rs"
keywords = ["hl7", "healthcare", "parser", "validator"]
categories = ["parser-implementations", "encoding"]

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
clap = { version = "4.0", features = ["derive"] }
uuid = { version = "1.0", features = ["v4"] }