syntax = "proto3";

package hl7v2.v1;

option go_package = "github.com/EffortlessMetrics/hl7v2-rs/api/proto/hl7v2/v1;hl7v2v1";

import "google/protobuf/struct.proto";

service HL7Service {
  // Parse an HL7 message
  rpc Parse (ParseRequest) returns (ParseResponse);

  // Parse a stream of HL7 messages (e.g. from MLLP)
  rpc ParseStream (HL7ServiceParseStreamRequest) returns (stream HL7ServiceParseStreamResponse);

  // Normalize an HL7 message
  rpc Normalize (NormalizeRequest) returns (NormalizeResponse);
}

// Request to parse a message
message ParseRequest {
  string message = 1;
  ParseOptions options = 2;
}

// Response from parsing
message ParseResponse {
  bool valid = 1;
  repeated string errors = 2;
  google.protobuf.Struct parsed_message = 3;
}

// Request to parse a stream
message HL7ServiceParseStreamRequest {
  bytes chunk = 1;
}

// Response from parsing a stream
message HL7ServiceParseStreamResponse {
  ParseResponse result = 1;
}

// Options for parsing
message ParseOptions {
  bool validate = 1;
  bool strict = 2;
}

// Request to normalize a message
message NormalizeRequest {
  string message = 1;
}

// Response from normalization
message NormalizeResponse {
  string normalized_message = 1;
}

// Error details
message Error {
  string code = 1;
  string message = 2;
  string path = 3;
}

// Ack code enum
enum AckType {
  ACK_TYPE_UNSPECIFIED = 0;
  ACK_TYPE_AA = 1;
  ACK_TYPE_AE = 2;
  ACK_TYPE_AR = 3;
}
