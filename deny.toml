# cargo-deny configuration for supply chain security
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# vulnerability = "deny" # Removed in 0.19.0 (default is deny)
# unmaintained = "warn" # Removed/Changed in 0.19.0
yanked = "deny"
# notice = "warn" # Removed in 0.19.0
ignore = []

[licenses]
# unlicensed = "deny" # Removed in 0.19.0
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
]
# deny = [ # Removed/Changed in 0.19.0
#    "GPL-3.0",
#    "AGPL-3.0",
# ]
# copyleft = "deny" # Removed in 0.19.0
# allow-osi-fsf-free = "neither" # Removed in 0.19.0
# default = "deny" # Removed in 0.19.0
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[sources.allow-org]
github = ["tokio-rs", "hyperium", "serde-rs"]
