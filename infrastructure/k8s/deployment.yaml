apiVersion: apps/v1
kind: Deployment
metadata:
  name: hl7v2-server
  labels:
    app: hl7v2-server
    version: v1.2.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hl7v2-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: hl7v2-server
        version: v1.2.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: hl7v2-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: hl7v2
        image: hl7v2-rs:latest
        imagePullPolicy: Always  # Use Always for production; dev can override with IfNotPresent

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: mllp
          containerPort: 2575
          protocol: TCP
        - name: grpc
          containerPort: 9090
          protocol: TCP

        env:
        - name: RUST_LOG
          value: info
        - name: HL7V2_CONFIG
          value: /etc/hl7v2/config.toml
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        volumeMounts:
        - name: config
          mountPath: /etc/hl7v2
          readOnly: true
        - name: profiles
          mountPath: /var/lib/hl7v2/profiles
          readOnly: true
        - name: tmp
          mountPath: /tmp

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true

      volumes:
      - name: config
        configMap:
          name: hl7v2-config
      - name: profiles
        configMap:
          name: hl7v2-profiles
      - name: tmp
        emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - hl7v2-server
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: hl7v2-server
  labels:
    app: hl7v2-server
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: mllp
    port: 2575
    targetPort: mllp
    protocol: TCP
  - name: grpc
    port: 9090
    targetPort: grpc
    protocol: TCP
  selector:
    app: hl7v2-server

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hl7v2-server
  labels:
    app: hl7v2-server

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hl7v2-server-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hl7v2-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hl7v2-server-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: hl7v2-server
