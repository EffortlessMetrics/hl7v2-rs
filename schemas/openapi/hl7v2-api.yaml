openapi: 3.0.3

info:
  title: HL7v2 Processing API
  version: 1.2.0
  description: |
    Production-ready REST API for parsing, validating, and processing HL7v2 healthcare messages.

    ## Features
    - Parse HL7v2 messages with or without MLLP framing
    - Validate messages against conformance profiles
    - Extract message metadata and structure
    - High-performance async processing with Axum + Tokio
    - Comprehensive error handling and validation feedback

    ## Authentication
    All API endpoints require authentication via API key in the `X-API-Key` header.

    ## Rate Limiting
    - 1000 requests per minute per API key
    - 429 Too Many Requests returned when exceeded
    - Rate limit headers included in responses

  contact:
    name: HL7v2 API Support
    url: https://github.com/EffortlessMetrics/hl7v2-rs
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.example.com
    description: Production server

tags:
  - name: Health
    description: Service health and readiness checks
  - name: Parse
    description: HL7v2 message parsing operations
  - name: Validation
    description: Profile-based message validation
  - name: Metrics
    description: Prometheus metrics (planned)

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns service health status, version, and uptime
      operationId: getHealth
      security: []  # Health endpoint doesn't require auth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  value:
                    status: healthy
                    version: "1.2.0"
                    uptime_seconds: 3600

  /ready:
    get:
      tags:
        - Health
      summary: Readiness check endpoint
      description: Returns 200 when service is ready to accept requests
      operationId: getReady
      security: []  # Readiness endpoint doesn't require auth
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean
                    example: true
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean
                    example: false

  /hl7/parse:
    post:
      tags:
        - Parse
      summary: Parse an HL7v2 message
      description: |
        Parses a raw HL7v2 message and returns structured JSON representation
        along with extracted metadata. Supports both MLLP-framed and plain text messages.
      operationId: parseMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParseRequest'
            examples:
              plain_message:
                summary: Plain HL7 message
                value:
                  message: "MSH|^~\\&|SendApp|SendFac|RecvApp|RecvFac|20231119120000||ADT^A01|MSG123|P|2.5\rPID|1||MRN123^^^Facility^MR||Doe^John^A||19800101|M\r"
                  mllp_framed: false
                  options:
                    include_json: true
                    validate_structure: true
              mllp_framed:
                summary: MLLP framed message
                value:
                  message: "\x0BMSH|^~\\&|SendApp|SendFac|RecvApp|RecvFac|20231119120000||ADT^A01|MSG123|P|2.5\rPID|1||MRN123^^^Facility^MR||Doe^John^A||19800101|M\r\x1C\x0D"
                  mllp_framed: true
                  options:
                    include_json: true
                    validate_structure: false
      responses:
        '200':
          description: Message parsed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParseResponse'
              examples:
                success:
                  value:
                    message:
                      segments:
                        - id: MSH
                          fields:
                            - "MSH"
                            - "|^~\\&|"
                            - "SendApp"
                        - id: PID
                          fields:
                            - "PID"
                            - "1"
                    metadata:
                      message_type: "ADT^A01"
                      version: "2.5"
                      sending_application: "SendApp"
                      sending_facility: "SendFac"
                      message_control_id: "MSG123"
                      segment_count: 2
                      charsets: []
                    warnings: []
        '400':
          description: Invalid request or parse error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                parse_error:
                  value:
                    code: PARSE_ERROR
                    message: "Invalid MSH segment: missing required fields"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalError'

  /hl7/validate:
    post:
      tags:
        - Validation
      summary: Validate an HL7v2 message against a profile
      description: |
        Validates an HL7v2 message against a conformance profile and returns
        detailed validation results including errors, warnings, and metadata.
      operationId: validateMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateRequest'
            examples:
              adt_validation:
                summary: Validate ADT^A01 message
                value:
                  message: "MSH|^~\\&|SendApp|SendFac|RecvApp|RecvFac|20231119120000||ADT^A01|MSG123|P|2.5\rPID|1||MRN123^^^Facility^MR||Doe^John^A||19800101|M\r"
                  profile: "ADT_A01"
                  mllp_framed: false
      responses:
        '200':
          description: Validation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'
              examples:
                valid:
                  summary: Message is valid
                  value:
                    valid: true
                    errors: []
                    warnings: []
                    metadata:
                      message_type: "ADT^A01"
                      version: "2.5"
                      sending_application: "SendApp"
                      sending_facility: "SendFac"
                      message_control_id: "MSG123"
                      segment_count: 2
                      charsets: []
                invalid:
                  summary: Message has validation errors
                  value:
                    valid: false
                    errors:
                      - code: "MISSING_REQUIRED_FIELD"
                        message: "Required field PID.3 (Patient ID) is missing"
                        location: "PID.3"
                        severity: error
                      - code: "VALUE_NOT_IN_CONSTRAINT"
                        message: "Value 'X' for PID.8 is not in allowed values: [M, F, O, U]"
                        location: "PID.8"
                        severity: error
                    warnings:
                      - code: "DEPRECATED_FIELD"
                        message: "Field PID.19 is deprecated in version 2.5"
                        location: "PID.19"
                    metadata:
                      message_type: "ADT^A01"
                      version: "2.5"
                      sending_application: "SendApp"
                      sending_facility: "SendFac"
                      message_control_id: "MSG123"
                      segment_count: 2
                      charsets: []
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                profile_not_found:
                  value:
                    code: VALIDATION_ERROR
                    message: "Profile 'INVALID_PROFILE' not found"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalError'

  /metrics:
    get:
      tags:
        - Metrics
      summary: Prometheus metrics endpoint
      description: |
        Returns Prometheus-formatted metrics for monitoring and observability.

        **Note**: This endpoint is planned for implementation in v1.2.0.
      operationId: getMetrics
      security: []  # Metrics endpoint typically doesn't require auth
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP hl7v2_requests_total Total number of requests
                  # TYPE hl7v2_requests_total counter
                  hl7v2_requests_total{endpoint="/hl7/parse",status="200"} 1234
                  # HELP hl7v2_request_duration_seconds Request duration in seconds
                  # TYPE hl7v2_request_duration_seconds histogram
                  hl7v2_request_duration_seconds_bucket{endpoint="/hl7/parse",le="0.01"} 500
        '501':
          description: Not yet implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
        - uptime_seconds
      properties:
        status:
          $ref: '#/components/schemas/HealthStatus'
        version:
          type: string
          description: Service version
          example: "1.2.0"
        uptime_seconds:
          type: integer
          format: int64
          description: Uptime in seconds
          example: 3600

    HealthStatus:
      type: string
      enum:
        - healthy
        - degraded
        - unhealthy
      description: Service health status

    ParseRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Raw HL7v2 message content (can be MLLP framed or plain)
          example: "MSH|^~\\&|SendApp|SendFac|RecvApp|RecvFac|20231119120000||ADT^A01|MSG123|P|2.5\rPID|1||MRN123^^^Facility^MR||Doe^John^A||19800101|M\r"
        mllp_framed:
          type: boolean
          default: false
          description: Whether the message is MLLP framed
        options:
          $ref: '#/components/schemas/ParseOptions'

    ParseOptions:
      type: object
      properties:
        include_json:
          type: boolean
          default: true
          description: Return JSON representation of message
        validate_structure:
          type: boolean
          default: true
          description: Validate structure (segment IDs, delimiters)

    ParseResponse:
      type: object
      required:
        - metadata
      properties:
        message:
          type: object
          description: Parsed message in JSON format
          nullable: true
        metadata:
          $ref: '#/components/schemas/MessageMetadata'
        warnings:
          type: array
          items:
            type: string
          description: Parsing warnings (if any)
          default: []

    ValidateRequest:
      type: object
      required:
        - message
        - profile
      properties:
        message:
          type: string
          description: Raw HL7v2 message content
          example: "MSH|^~\\&|SendApp|SendFac|RecvApp|RecvFac|20231119120000||ADT^A01|MSG123|P|2.5\rPID|1||MRN123^^^Facility^MR||Doe^John^A||19800101|M\r"
        profile:
          type: string
          description: Profile to validate against (path or name)
          example: "ADT_A01"
        mllp_framed:
          type: boolean
          default: false
          description: Whether the message is MLLP framed

    ValidateResponse:
      type: object
      required:
        - valid
        - metadata
      properties:
        valid:
          type: boolean
          description: Whether validation passed
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          description: Validation errors
          default: []
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationWarning'
          description: Validation warnings
          default: []
        metadata:
          $ref: '#/components/schemas/MessageMetadata'

    MessageMetadata:
      type: object
      required:
        - message_type
        - version
        - sending_application
        - sending_facility
        - message_control_id
        - segment_count
        - charsets
      properties:
        message_type:
          type: string
          description: Message type (e.g., "ADT^A01")
          example: "ADT^A01"
        version:
          type: string
          description: HL7 version (e.g., "2.5")
          example: "2.5"
        sending_application:
          type: string
          description: Sending application
          example: "SendApp"
        sending_facility:
          type: string
          description: Sending facility
          example: "SendFac"
        message_control_id:
          type: string
          description: Message control ID
          example: "MSG123"
        segment_count:
          type: integer
          description: Number of segments
          example: 2
        charsets:
          type: array
          items:
            type: string
          description: Character sets used
          example: []

    ValidationError:
      type: object
      required:
        - code
        - message
        - severity
      properties:
        code:
          type: string
          description: Error code (e.g., "V_RequiredField")
          example: "MISSING_REQUIRED_FIELD"
        message:
          type: string
          description: Human-readable error message
          example: "Required field PID.3 (Patient ID) is missing"
        location:
          type: string
          description: Location in message (e.g., "PID.5[1].1")
          example: "PID.3"
          nullable: true
        severity:
          $ref: '#/components/schemas/ErrorSeverity'

    ValidationWarning:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Warning code
          example: "DEPRECATED_FIELD"
        message:
          type: string
          description: Human-readable warning message
          example: "Field PID.19 is deprecated in version 2.5"
        location:
          type: string
          description: Location in message
          example: "PID.19"
          nullable: true

    ErrorSeverity:
      type: string
      enum:
        - error
        - warning
        - info
      description: Error severity level

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code
          example: "PARSE_ERROR"
        message:
          type: string
          description: Human-readable error message
          example: "Invalid MSH segment: missing required fields"
        details:
          type: object
          description: Additional error details
          nullable: true

  responses:
    Unauthorized:
      description: Unauthorized - invalid or missing API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: UNAUTHORIZED
            message: "Invalid or missing API key"
      headers:
        WWW-Authenticate:
          schema:
            type: string
            example: "ApiKey"

    RateLimitExceeded:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: RATE_LIMIT_EXCEEDED
            message: "Rate limit exceeded: 1000 requests per minute"
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
            example: 1000
        X-RateLimit-Remaining:
          schema:
            type: integer
            example: 0
        X-RateLimit-Reset:
          schema:
            type: integer
            format: int64
            example: 1700400000

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: INTERNAL_ERROR
            message: "An unexpected error occurred"
